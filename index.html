<!doctype html>
<html lang="en" class="h-full">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animal Sounds Adventure</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
</head>

<body class="h-full overflow-auto">
  <div id="app" class="h-full w-full grass-bg relative overflow-auto"><!-- Clouds -->
    <div class="cloud" style="width:120px;height:40px;top:8%;left:10%;animation:float 5s ease-in-out infinite"></div>
    <div class="cloud" style="width:80px;height:30px;top:5%;right:15%;animation:float 4s ease-in-out infinite 1s"></div>
    <div class="cloud" style="width:100px;height:35px;top:15%;left:55%;animation:float 6s ease-in-out infinite 0.5s">
    </div><!-- SCREEN: Welcome -->
    <div id="screen-welcome" class="relative z-10 flex flex-col items-center justify-center h-full px-4 text-center">
      <div class="bounce-in">
        <div class="text-7xl mb-4">
          🐾
        </div>
        <h1 id="title-text" class="text-4xl md:text-5xl font-bold text-white drop-shadow-lg mb-3">Animal Sounds
          Adventure</h1>
        <p class="text-lg text-white/90 drop-shadow mb-8 max-w-md">Learn what sounds animals make, then test your
          knowledge in a fun game!</p><button id="btn-start-learn" onclick="goToLearn()"
          class="px-8 py-4 bg-yellow-400 hover:bg-yellow-300 text-yellow-900 font-bold text-xl rounded-full shadow-lg hover:shadow-xl transition-all active:scale-95">
          <span id="learn-btn-text">🎵 Meet the Animals!</span> </button>
      </div>
    </div><!-- SCREEN: Learn -->
    <div id="screen-learn" class="relative z-10 hidden flex-col items-center h-full px-4 py-6 overflow-auto">
      <h2 class="text-3xl font-bold text-white drop-shadow-lg mb-2">🎶 Meet the Animals</h2>
      <p class="text-white/80 mb-5">Tap each animal to hear its sound!</p>
      <div id="animal-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 max-w-3xl w-full mb-6"></div>
      <div id="learn-progress" class="text-white/80 text-sm mb-3"></div><button id="btn-start-game" onclick="goToGame()"
        class="px-8 py-3 bg-orange-500 hover:bg-orange-400 text-white font-bold text-lg rounded-full shadow-lg transition-all active:scale-95 disabled:opacity-40 disabled:cursor-not-allowed"
        disabled> 🎮 Play the Game! </button>
    </div><!-- SCREEN: Game -->
    <div id="screen-game" class="relative z-10 hidden flex-col items-center h-full px-4 py-6 overflow-auto">
      <div class="flex items-center justify-between w-full max-w-lg mb-4"><button onclick="goToLearn()"
          class="text-white/80 hover:text-white transition flex items-center gap-1 text-sm"> <i data-lucide="arrow-left"
            style="width:18px;height:18px"></i> Back </button>
        <div class="flex items-center gap-4"><span id="score-display"
            class="bg-white/20 backdrop-blur-sm text-white font-bold px-4 py-1.5 rounded-full text-sm">⭐ 0 / 0</span>
          <span id="round-display"
            class="bg-white/20 backdrop-blur-sm text-white px-3 py-1.5 rounded-full text-sm"></span>
        </div>
      </div>
      <div id="game-question"
        class="bg-white/95 backdrop-blur rounded-3xl shadow-xl p-6 md:p-8 max-w-lg w-full text-center">
        <p class="text-gray-500 text-sm mb-2">Which animal makes this sound?</p>
        <div id="game-sound-text" class="text-5xl md:text-6xl font-bold text-emerald-600 mb-2 wiggle"></div><button
          id="btn-replay" onclick="replaySound()"
          class="text-sm text-emerald-500 hover:text-emerald-700 mb-5 flex items-center gap-1 mx-auto transition"> <i
            data-lucide="volume-2" style="width:16px;height:16px"></i> Play again </button>
        <div id="game-options" class="grid grid-cols-2 gap-3"></div>
        <div id="game-feedback" class="mt-4 text-lg font-bold hidden"></div>
      </div>
      <div id="game-next-wrap" class="mt-4 hidden"><button onclick="nextQuestion()"
          class="px-6 py-3 bg-yellow-400 hover:bg-yellow-300 text-yellow-900 font-bold rounded-full shadow-lg transition-all active:scale-95">
          Next → </button>
      </div>
    </div><!-- SCREEN: Results -->
    <div id="screen-results" class="relative z-10 hidden flex-col items-center justify-center h-full px-4 text-center">
      <div class="bg-white/95 backdrop-blur rounded-3xl shadow-xl p-8 max-w-md w-full bounce-in">
        <div class="text-6xl mb-3" id="result-emoji">
          🏆
        </div>
        <h2 class="text-3xl font-bold text-gray-800 mb-2">Great Job!</h2>
        <p id="result-text" class="text-lg text-gray-600 mb-2"></p>
        <div id="result-stars" class="text-4xl mb-5"></div>
        <div class="flex flex-col gap-3"><button onclick="goToGame()"
            class="px-6 py-3 bg-emerald-500 hover:bg-emerald-400 text-white font-bold rounded-full shadow transition-all active:scale-95">🔄
            Play Again</button> <button onclick="goToLearn()"
            class="px-6 py-3 bg-blue-500 hover:bg-blue-400 text-white font-bold rounded-full shadow transition-all active:scale-95">📚
            Review Animals</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
