<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animal Sounds Quiz</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Fredoka', sans-serif; }
    @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
    @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
    @keyframes pulse-glow { 0%,100% { box-shadow: 0 0 0 0 rgba(255,200,50,0.4); } 50% { box-shadow: 0 0 20px 8px rgba(255,200,50,0.2); } }
    .pop-in { animation: popIn 0.35s ease-out both; }
    .shake { animation: shake 0.4s ease-in-out; }
    .bounce { animation: bounce 0.5s ease-in-out; }
    .glow { animation: pulse-glow 1.5s ease-in-out infinite; }
    .option-btn { transition: all 0.15s ease; }
    .option-btn:hover { transform: translateY(-3px); }
    .option-btn:active { transform: scale(0.95); }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full overflow-auto" style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);"><!-- Start Screen -->
   <div id="screen-start" class="flex flex-col items-center justify-center h-full px-4 text-center">
    <div class="pop-in" style="animation-delay:0.1s"><span class="text-7xl block mb-4">🎵</span>
    </div>
    <h1 id="title-text" class="text-4xl md:text-5xl font-bold mb-3 pop-in" style="color:#fcd34d; animation-delay:0.2s">Animal Sounds Quiz</h1>
    <p class="text-lg mb-8 pop-in" style="color:#94a3b8; animation-delay:0.3s">Can you match the sound to the animal?</p><button onclick="startGame()" class="option-btn glow px-10 py-4 rounded-2xl text-xl font-bold pop-in" style="background:#fcd34d; color:#1a1a2e; animation-delay:0.4s"> <i data-lucide="play" class="inline w-5 h-5 mr-2 align-middle"></i>Play </button>
   </div><!-- Game Screen -->
   <div id="screen-game" class="hidden flex flex-col items-center h-full px-4 py-6">
    <div class="w-full max-w-lg">
     <div class="flex justify-between items-center mb-4"><span id="round-label" class="text-sm font-medium" style="color:#94a3b8">Round 1 / 10</span> <span id="score-label" class="text-sm font-bold px-3 py-1 rounded-full" style="background:#fcd34d22; color:#fcd34d">Score: 0</span>
     </div>
     <div class="w-full rounded-full h-2 mb-8" style="background:#ffffff12">
      <div id="progress-bar" class="h-2 rounded-full transition-all duration-500" style="background:#fcd34d; width:10%"></div>
     </div>
    </div>
    <div id="sound-display" class="rounded-3xl p-8 mb-6 text-center pop-in w-full max-w-lg" style="background:#ffffff08; border:1px solid #ffffff12">
     <p class="text-sm mb-2 font-medium" style="color:#94a3b8">What animal makes this sound?</p>
     <p id="sound-text" class="text-4xl md:text-5xl font-bold" style="color:#fcd34d">"Woof!"</p><button id="play-sound-btn" onclick="playCurrentSound()" class="mt-4 px-5 py-2 rounded-xl text-sm font-medium option-btn" style="background:#fcd34d22; color:#fcd34d"> <i data-lucide="volume-2" class="inline w-4 h-4 mr-1 align-middle"></i>Play Sound </button>
    </div>
    <div id="options-grid" class="grid grid-cols-2 gap-3 w-full max-w-lg"></div>
    <div id="feedback" class="hidden mt-5 px-6 py-3 rounded-xl text-center font-bold text-lg w-full max-w-lg"></div>
   </div><!-- Results Screen -->
   <div id="screen-results" class="hidden flex flex-col items-center justify-center h-full px-4 text-center"><span id="result-emoji" class="text-7xl block mb-4 pop-in">🏆</span>
    <h2 class="text-3xl md:text-4xl font-bold mb-2 pop-in" style="color:#fcd34d; animation-delay:0.1s">Game Over!</h2>
    <p id="result-score" class="text-xl mb-2 pop-in" style="color:#e2e8f0; animation-delay:0.2s">You scored 8/10</p>
    <p id="result-msg" class="text-lg mb-8 pop-in" style="color:#94a3b8; animation-delay:0.3s">Amazing!</p><button onclick="startGame()" class="option-btn glow px-10 py-4 rounded-2xl text-xl font-bold pop-in" style="background:#fcd34d; color:#1a1a2e; animation-delay:0.4s"> <i data-lucide="rotate-ccw" class="inline w-5 h-5 mr-2 align-middle"></i>Play Again </button>
   </div>
  </div>
  <script>
const animals = [
  { emoji: "🐶", name: "Dog", sounds: ["Woof!", "Bark!", "Arf!"] },
  { emoji: "🐱", name: "Cat", sounds: ["Meow!", "Mew!"] },
  { emoji: "🐄", name: "Cow", sounds: ["Moo!", "Moooo!"] },
  { emoji: "🐦", name: "Bird", sounds: ["Tweet!", "Chirp!", "Caw!"] },
  { emoji: "🐷", name: "Pig", sounds: ["Oink!", "Oink!"] },
  { emoji: "🐴", name: "Horse", sounds: ["Neigh!", "Neigh!"] },
  { emoji: "🐺", name: "Wolf", sounds: ["Howl!", "Arooo!"] },
  { emoji: "🐍", name: "Snake", sounds: ["Hiss!", "Ssss!"] },
  { emoji: "🐸", name: "Frog", sounds: ["Ribbit!", "Croak!"] },
  { emoji: "🐋", name: "Whale", sounds: ["Oooo!", "Whaaa!"] },
  { emoji: "🦉", name: "Owl", sounds: ["Hoot!", "Who-who!"] },
  { emoji: "🐑", name: "Sheep", sounds: ["Baa!", "Baaa!"] },
  { emoji: "🐔", name: "Chicken", sounds: ["Cluck!", "Bawk!"] },
  { emoji: "🐝", name: "Bee", sounds: ["Buzz!", "Bzzz!"] },
  { emoji: "🐒", name: "Monkey", sounds: ["Ooh-ooh!", "Eee-eee!"] },
  { emoji: "🦁", name: "Lion", sounds: ["Roar!", "Grrr!"] },
];

const TOTAL_ROUNDS = 10;
let currentRound = 0, score = 0, rounds = [], answered = false;

// Audio context for sounds
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

const animalSounds = {
  Dog: "sounds/Dog.mp3",
  Cat: "sounds/Cat.mp3",
  Cow: "sounds/Cow.mp3",
  Bird: "sounds/Bird.mp3",
  Pig: "sounds/Pig.mp3",
  Horse: "sounds/Horse.mp3",
  Wolf: "sounds/Wolf.mp3",
  Snake: "sounds/Snake.mp3",
  Frog: "sounds/Frog.mp3",
  Whale: "sounds/Whale.mp3",
  Owl: "sounds/Owl.mp3",
  Sheep: "sounds/Sheep.mp3",
  Chicken: "sounds/Chicken.mp3",
  Bee: "sounds/Bee.mp3",
  Monkey: "sounds/Monkey.mp3",
  Lion: "sounds/Lion.mp3"
};

let currentAudio = null;

function stopCurrentAudio() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
  }
}

function playAnimalSound(name) {
  const sound = animalSounds[name];
  if (!sound) {
    console.log("Sound tidak ditemukan:", name);
    return;
  }

  // stop audio sebelumnya
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
  }

  currentAudio = new Audio(sound);

  currentAudio.play().catch(err => {
    console.log("Gagal play audio:", err);
  });
}

function playCurrentSound() {
  playAnimalSound(rounds[currentRound].correct.name);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
  return arr;
}

function showScreen(id) {
  ['screen-start','screen-game','screen-results'].forEach(s => {
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
}

function startGame() {
  currentRound = 0; score = 0; answered = false;
  const shuffled = shuffle([...animals]);
  rounds = [];
  for (let i = 0; i < TOTAL_ROUNDS; i++) {
    const correct = shuffled[i % shuffled.length];
    let options = [correct];
    const others = animals.filter(a => a.name !== correct.name);
    shuffle(others);
    options.push(...others.slice(0, 3));
    rounds.push({ correct, options: shuffle(options), sound: correct.sounds[Math.floor(Math.random()*correct.sounds.length)] });
  }
  showScreen('screen-game');
  renderRound();
}

function renderRound() {
    stopCurrentAudio();

  answered = false;
  const r = rounds[currentRound];
  document.getElementById('round-label').textContent = `Round ${currentRound+1} / ${TOTAL_ROUNDS}`;
  document.getElementById('score-label').textContent = `Score: ${score}`;
  document.getElementById('progress-bar').style.width = `${((currentRound+1)/TOTAL_ROUNDS)*100}%`;
  document.getElementById('sound-text').textContent = `"${r.sound}"`;
  document.getElementById('feedback').classList.add('hidden');

  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  r.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn pop-in rounded-2xl p-4 text-center font-semibold text-lg';
    btn.style.cssText = `background:#ffffff0d; border:2px solid #ffffff15; color:#e2e8f0; animation-delay:${i*0.08}s`;
    btn.innerHTML = `<span class="text-3xl block mb-1">${opt.emoji}</span>${opt.name}`;
    btn.onclick = () => handleAnswer(opt, btn);
    grid.appendChild(btn);
  });
  lucide.createIcons();
}

function handleAnswer(opt, btn) {
  if (answered) return;
  answered = true;
  const r = rounds[currentRound];
  const correct = opt.name === r.correct.name;
  if (correct) score++;

  // Highlight buttons
  document.querySelectorAll('#options-grid button').forEach(b => {
    const name = b.textContent.trim().split('\n').pop();
    if (b === btn && !correct) { b.style.background = '#ef444444'; b.style.borderColor = '#ef4444'; b.classList.add('shake'); }
    if (name === r.correct.name) { b.style.background = '#22c55e33'; b.style.borderColor = '#22c55e'; b.classList.add('bounce'); }
    b.style.pointerEvents = 'none';
  });

  const fb = document.getElementById('feedback');
  fb.classList.remove('hidden');
  fb.style.background = correct ? '#22c55e22' : '#ef444422';
  fb.style.color = correct ? '#4ade80' : '#f87171';
  fb.textContent = correct ? '✓ Correct!' : `✗ It was ${r.correct.emoji} ${r.correct.name}!`;

  document.getElementById('score-label').textContent = `Score: ${score}`;

  if (correct) playAnimalSound(r.correct.name);

  setTimeout(() => {
    stopCurrentAudio();

    currentRound++;
    if (currentRound >= TOTAL_ROUNDS) showResults();
    else renderRound();
  }, 4000);
}

function showResults() {
  const pct = score / TOTAL_ROUNDS;
  const emoji = pct >= 0.9 ? '🏆' : pct >= 0.7 ? '🌟' : pct >= 0.5 ? '😊' : '💪';
  const msg = pct >= 0.9 ? 'Outstanding!' : pct >= 0.7 ? 'Great job!' : pct >= 0.5 ? 'Nice try!' : 'Keep practicing!';
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-score').textContent = `You scored ${score} / ${TOTAL_ROUNDS}`;
  document.getElementById('result-msg').textContent = msg;
  showScreen('screen-results');
  lucide.createIcons();
}

// Element SDK
const defaultConfig = {
  game_title: 'Animal Sounds Quiz',
  background_color: '#1a1a2e',
  accent_color: '#fcd34d',
  text_color: '#e2e8f0',
  surface_color: '#ffffff0d',
  muted_color: '#94a3b8',
  font_family: 'Fredoka',
  font_size: 16
};

function applyConfig(config) {
  const c = { ...defaultConfig, ...config };
  const app = document.getElementById('app');
  app.style.background = `linear-gradient(135deg, ${c.background_color} 0%, ${c.background_color}ee 100%)`;
  document.getElementById('title-text').textContent = c.game_title;
  document.querySelectorAll('[style*="color:#fcd34d"], [style*="color: #fcd34d"]').forEach(el => el.style.color = c.accent_color);
  document.querySelectorAll('[style*="background:#fcd34d"]').forEach(el => { el.style.background = c.accent_color; el.style.color = c.background_color; });
  document.getElementById('progress-bar').style.background = c.accent_color;
  document.body.style.fontFamily = `${c.font_family}, Fredoka, sans-serif`;
}

window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => applyConfig(config),
  mapToCapabilities: (config) => ({
    recolorables: [
      { get: () => config.background_color || defaultConfig.background_color, set: v => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
      { get: () => config.surface_color || defaultConfig.surface_color, set: v => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
      { get: () => config.text_color || defaultConfig.text_color, set: v => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
      { get: () => config.accent_color || defaultConfig.accent_color, set: v => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } },
      { get: () => config.muted_color || defaultConfig.muted_color, set: v => { config.muted_color = v; window.elementSdk.setConfig({ muted_color: v }); } },
    ],
    borderables: [],
    fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: v => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
    fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: v => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } },
  }),
  mapToEditPanelValues: (config) => new Map([
    ["game_title", config.game_title || defaultConfig.game_title]
  ])
});

lucide.createIcons();
</script>
